<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Box | نهندس المستقبل</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* حاوية المحتوى الرئيسي */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 4rem;
            letter-spacing: 10px;
            margin-bottom: 10px;
            background: linear-gradient(to dotted, #fff, #444);
            -webkit-background-clip: text;
            /* تأثير بسيط على الكلمة */
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        p {
            font-size: 1.5rem;
            color: #888;
            margin-bottom: 30px;
        }

        .coming-soon {
            font-weight: bold;
            color: #4da6ff;
            border: 1px solid #4da6ff;
            padding: 10px 30px;
            border-radius: 50px;
            display: inline-block;
        }

        /* الفوتر المطلوب لتوثيق جوجل */
        footer {
            padding: 20px;
            background: #050505;
            border-top: 1px solid #1a1a1a;
            font-size: 0.9rem;
        }

        footer a {
            color: #555;
            text-decoration: none;
            margin: 0 15px;
            transition: color 0.3s;
        }

        footer a:hover {
            color: #fff;
        }

        .copyright {
            margin-top: 10px;
            color: #333;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="main-content">
        <h1>BLACK BOX</h1>
        <p>نهندس المستقبل</p>
        <div class="coming-soon">قريباً...</div>
    </div>

    <footer>
        <div class="links">
            <a href="privacy.html">سياسة الخصوصية</a>
            <a href="terms.html">شروط الاستخدام</a>
            <a href="mailto:support@blackbox.tech">الدعم الفني</a>
        </div>
        <div class="copyright">
            &copy; 2026 Black Box. جميع الحقوق محفوظة.
        </div>
    </footer>

</body>
</html>
